name: Refresh Module Catalog

on:
  schedule:
    # China Standard Time 00:00 == UTC 16:00
    - cron: "0 16 * * *"
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    # Skip re-entry from bot metadata commits; gitee is already synced in the same run.
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and publish generated proxy files
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/normalize_catalog.py
      - run: python scripts/validate_catalog.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules.json module site
          if ! git diff --staged --quiet; then
            git commit -m "chore: refresh module proxy data"
            git push
          fi
